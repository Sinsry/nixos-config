<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aperosbros.net</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a0000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.04) 2px,
          rgba(0, 0, 0, 0.04) 4px);
      pointer-events: none;
      z-index: 10;
    }

    .guru-box {
      border: 2px solid #6b1010;
      background: #0d0000;
      box-shadow:
        inset 0 0 0 1px #3a0000,
        0 0 60px rgba(0, 0, 0, 0.95),
        0 0 120px rgba(80, 0, 0, 0.3);
      padding: 0;
      width: min(780px, 96vw);
      animation: flicker 10s infinite;
      position: relative;
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 1;
      }

      94% {
        opacity: 1;
      }

      95% {
        opacity: 0.93;
      }

      96% {
        opacity: 1;
      }

      98% {
        opacity: 0.97;
      }

      99% {
        opacity: 1;
      }
    }

    .guru-header {
      background: #1f0000;
      border-bottom: 2px solid #4a0808;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .guru-title {
      font-family: 'VT323', monospace;
      font-size: 26px;
      color: #cc3333;
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(180, 0, 0, 0.6);
    }

    .guru-blink {
      width: 12px;
      height: 12px;
      background: #cc2200;
      border: 1px solid #661100;
      box-shadow: 0 0 6px rgba(180, 0, 0, 0.8);
      animation: blink 1.4s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .guru-image {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      overflow: hidden;
    }

    .guru-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
      display: block;
      filter: contrast(1.05) brightness(0.9);
    }

    .guru-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(to bottom,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 3px,
          rgba(0, 0, 0, 0.08) 3px,
          rgba(0, 0, 0, 0.08) 4px);
      pointer-events: none;
    }

    .guru-image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, #0d0000 100%);
      pointer-events: none;
    }

    .guru-body {
      padding: 18px 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-top: 1px solid #2a0000;
    }

    .guru-code {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: #cc4444;
      letter-spacing: 3px;
      text-align: center;
      line-height: 1.7;
    }

    .guru-code .addr {
      color: #886644;
      font-size: 18px;
      display: block;
    }

    .guru-code .task {
      color: #884444;
      font-size: 16px;
    }

    .guru-footer {
      border-top: 1px solid #2a0000;
      padding: 8px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .guru-footer-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(150, 80, 80, 0.35);
      letter-spacing: 1px;
    }

    .guru-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: rgba(180, 60, 60, 0.4);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          rgba(0, 0, 0, 0) 0px,
          rgba(0, 0, 0, 0) 3px,
          rgba(0, 0, 0, 0.06) 3px,
          rgba(0, 0, 0, 0.06) 4px);
      pointer-events: none;
      z-index: 5;
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
        padding-top: 20px;
      }
    }
  </style>
</head>
